services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: smp-vpp-postgres
    environment:
      POSTGRES_DB: smp
      POSTGRES_USER: smp
      POSTGRES_PASSWORD: smp
    ports:
      - "5432:5432"
    volumes:
      - smp_vpp_pgdata:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/002_timescaledb_optional.sql:/docker-entrypoint-initdb.d/002_timescaledb_optional.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smp -d smp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smp_vpp_pgdata:
